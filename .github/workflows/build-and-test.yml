name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoMover.slnx

      - name: Build
        run: dotnet build AutoMover.slnx --no-restore -c Release

      - name: Test
        run: dotnet test AutoMover.slnx --no-build -c Release --verbosity normal
